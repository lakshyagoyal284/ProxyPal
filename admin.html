<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ProxyPal Admin Panel - Manage task requests and ProxyPal registrations (frontend demo).">
  <title>Admin Panel | ProxyPal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="admin">

  <div class="loading-overlay" id="pageLoader">
    <div class="text-center">
      <div class="spinner-border text-light mb-3" role="status"></div>
      <p class="text-white">Loading admin...</p>
    </div>
  </div>

  <div id="navbar-container"></div>

  <header class="page-header">
    <div class="container">
      <h1 class="display-6 fw-bold"><i class="fa-solid fa-shield-halved me-2"></i>Admin <span class="text-gradient">Panel</span></h1>
      <p class="text-secondary mb-0">Frontend demo — data stored in localStorage</p>
    </div>
  </header>

  <main class="form-page pt-0">
    <div class="container">
      <!-- Search & filter -->
      <div class="glass-card p-3 mb-4 reveal">
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label for="adminSearch" class="form-label">Search</label>
            <input type="search" class="form-control" id="adminSearch" placeholder="Search by name, city, task type...">
          </div>
          <div class="col-md-4">
            <label for="filterStatus" class="form-label">Filter by status</label>
            <select class="form-select" id="filterStatus">
              <option value="all">All statuses</option>
              <option value="pending">Pending</option>
              <option value="active">Active</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div class="col-md-2">
            <button type="button" class="btn btn-outline-glass w-100" id="refreshAdmin">
              <i class="fa-solid fa-rotate me-1"></i> Refresh
            </button>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-3" id="adminTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="tasks-tab" data-bs-toggle="tab" data-bs-target="#tasks-panel" type="button">Task Requests</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="workers-tab" data-bs-toggle="tab" data-bs-target="#workers-panel" type="button">ProxyPals</button>
        </li>
      </ul>

      <div class="tab-content reveal">
        <!-- Tasks table -->
        <div class="tab-pane fade show active" id="tasks-panel" role="tabpanel">
          <div class="glass-card p-3 table-responsive">
            <table class="table table-hover admin-table mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Client</th>
                  <th>Task Type</th>
                  <th>Location</th>
                  <th>Budget</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="tasksTableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- ProxyPals table -->
        <div class="tab-pane fade" id="workers-panel" role="tabpanel">
          <div class="glass-card p-3 table-responsive">
            <table class="table table-hover admin-table mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>City</th>
                  <th>Rate</th>
                  <th>Rating</th>
                  <th>Joined</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="proxypalsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>
  <div id="shared-components"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/main.js"></script>
  <script src="js/components.js"></script>
  <script src="js/admin.js"></script>
  <script>
    $("#refreshAdmin").on("click", function () {
      renderAdminTables();
      showToast("Data refreshed.", "info");
    });
  </script>
</body>
</html>
